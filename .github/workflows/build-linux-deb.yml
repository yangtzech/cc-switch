name: Build Linux Deb

on:
  pull_request:
    branches: [main]

concurrency:
  group: build-linux-deb-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux-deb:
    name: Build Linux x86_64 Deb
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system deps
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev curl wget file patchelf \
            libgtk-3-dev librsvg2-dev libayatana-appindicator3-dev
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.3
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Cache Cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Remove updater pubkey (skip signing)
        shell: bash
        run: |
          python3 -c "
          import json
          with open('src-tauri/tauri.conf.json', 'r') as f:
              cfg = json.load(f)
          cfg.get('plugins', {}).get('updater', {}).pop('pubkey', None)
          with open('src-tauri/tauri.conf.json', 'w') as f:
              json.dump(cfg, f, indent=2)
          "

      - name: Build Tauri App (deb only)
        run: pnpm tauri build --bundles deb

      - name: Upload deb artifact
        uses: actions/upload-artifact@v7
        with:
          name: cc-switch-linux-amd64-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error
