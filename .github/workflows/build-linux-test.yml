name: Build Linux (Test)

on:
  workflow_dispatch:

concurrency:
  group: build-linux-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: Build Linux x86_64
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system deps
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev curl wget file patchelf \
            libgtk-3-dev librsvg2-dev libayatana-appindicator3-dev
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.3
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Cache Cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri App (Linux)
        run: pnpm tauri build --bundles deb

      - name: Prepare Linux Assets
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          DEB=$(find src-tauri/target/release/bundle -name "*.deb" | head -1)
          cp "$DEB" release-assets/
          echo "Deb: $(basename "$DEB")"
          ls -la release-assets/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cc-switch-linux-x86_64
          path: release-assets/*
          if-no-files-found: error
